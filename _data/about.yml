lead: "Je n'interviens pas pour ajouter de la complexité. J'arrive avec un objectif précis — <span class=\"accent\">réduire un coût</span>, <span class=\"accent\">débloquer un pipeline</span>, <span class=\"accent\">sécuriser une infrastructure</span> — et je repars avec un livrable mesurable."

points:
  - "<strong>Missions courtes par conception.</strong> Audits en jours, mise en œuvre en semaines."
  - "<strong>Guidé par le contexte,</strong> jamais par des recettes toutes faites."
  - "<strong>Documentation incluse</strong> pour l'autonomie de vos équipes."

finance_text: "Sept ans exclusivement dans des environnements financiers exigeants. Fiabilité et traçabilité ne sont pas optionnelles. Expériences auprès de :"

clients:
  - Natixis
  - BPI France
  - Crédit Agricole CIB
