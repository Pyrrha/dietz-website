fr: &DEFAULT_FR
  header:
    title: Réduisez vos coûts infra sans compromettre la qualité.
    text: Payez moins, obtenez mieux.
    button: Voir comment je peux réduire vos coûts
    buttonlink: "#services"

  services:
    title: Services
    text: Des interventions courtes avec des résultats durables.
    section: services
    list:
      - title: "Audit FinOps"
        desc: "J'analyse vos coûts Cloud par business unit et identifie les gaspillages actionnables."
        icon: fas fa-magnifying-glass
      - title: "Refonte CI/CD"
        desc: "J'audite, refonds ou construis vos pipelines CI/CD avec des templates réutilisables et une culture FinOps intégrée. Résultats mesurables."
        icon: fas fa-bolt
      - title: "Kubernetes & Infra"
        desc: "Déploiement, hardening et opération de clusters Kubernetes. Suivi des pratiques GitOps via l'IaC, mise en place de monitoring."
        icon: fab fa-kubernetes

  portfolio:
    title: "Réalisations"
    text: "Des interventions courtes avec des résultats durables."
    section: portfolio
    closebutton: "Fermer ce projet"

  timeline:
    title: "Histoire"
    text: "Éléments clés de l'activité"
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "Création de la société à Marseille"
        year: "Août 2016"
        desc: "Ouverture de la société dans le bassin marseillais avec une première offre orientée création de sites web et réparation de matériel."
        image: assets/img/timeline/marseille.jpg
        alt: Photo de Marseille de Kaja Sariwating sur Unsplash
      - title: "Déménagement à Paris"
        year: "Février 2019"
        desc: "L'activité se recentre sur le DevOps et les infrastructures cloud, là où la valeur est la plus directe pour les clients. Début des premières missions dans des environnements financiers exigeants."
        image: assets/img/timeline/paris.jpg
        alt: Photo de Paris de Anthony Delanoix sur Unsplash
      - title: "Certification Terraform Associate"
        year: "Octobre 2022"
        desc: "L'infrastructure as code comme discipline, pas comme outil. Validation de la capacité à concevoir, versionner et opérer des architectures cloud reproductibles avec Terraform."
        image: assets/img/timeline/terraform.png
        alt: Logo Terraform
      - title: "Certification Kubernetes Administrator"
        year: "Septembre 2023"
        desc: "Certification de référence pour l'administration de clusters Kubernetes en production. Déploiement, upgrade, troubleshooting et gestion des workloads à l'échelle."
        image: assets/img/timeline/cka.png
        alt: Logo CKA
      - title: "Certification AWS Cloud Practitioner"
        year: "Novembre 2024"
        desc: "Maîtrise des services fondamentaux AWS — IAM, EC2, EKS, S3, RDS, CloudFront, Route53. Socle certifié pour des recommandations FinOps ancrées dans la réalité des coûts AWS."
        image: assets/img/timeline/aws-cp.png
        alt: Logo Cloud Practitioner AWS
      - title: "Certification Kubernetes Security Specialist"
        year: "Avril 2025"
        desc: "La certification la plus exigeante de l'écosystème Kubernetes. Hardening de clusters, sécurisation de la supply chain, network policies et détection des menaces en environnement de production."
        image: assets/img/timeline/cks.jpg
        alt: Logo CKS
      - title: "Déménagement à Nice"
        year: "2025"
        desc: "Toujours disponible pour des missions courtes à fort impact. La localisation change, l'exigence reste la même."
        image: assets/img/timeline/nice.jpg
        alt: "Photo de Nice de Dejox sur Unsplash"
    end: "Écrivons <br> la suite <br> ensemble !"

  about:
    title: "À propos"
    text: "Mon approche"
    body: "Je n'interviens pas pour ajouter de la complexité. J'arrive avec un objectif précis — réduire un coût, débloquer un pipeline, sécuriser une infrastructure — et je repars avec un livrable mesurable. <br> <br> Mes missions sont courtes par conception : audit en quelques jours, implémentation en quelques semaines. Chaque intervention commence par comprendre votre contexte, pas par appliquer une recette. Et chaque livrable inclut la documentation pour que vos équipes puissent opérer sans moi. <br> <br> 7 ans de missions exclusivement dans des environnements financiers exigeants — Natixis, BPI France, Crédit Agricole CIB — m'ont appris que la fiabilité et la traçabilité ne sont pas optionnelles."
    section: about

  contact:
    title: "Me contacter"
    text: "De quoi avez-vous besoin ?"
    section: contact

  footer:
    legal: "Mentions légales"
    social:
      - url: https://www.linkedin.com/in/tristan-dietz/
        icon: "fab fa-linkedin-in"
      - url: https://github.com/Pyrrha
        icon: "fab fa-github"
      - url: https://cal.eu/tristan-dietz/echange-initial
        icon: "fa fa-calendar-days"
